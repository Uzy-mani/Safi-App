<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safi App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Welcome to Safi App</h1>
        <p>Your platform for connecting skilled individuals with employers</p>
    </header>

    <section id="features">
        <h2>Our Services</h2>
        <ul>
            <li>Find skilled workers easily</li>
            <li>Post jobs quickly</li>
            <li>Connect with local talent</li>
        </ul>
    </section>

    <section id="job-list">
        <h2>Available Jobs</h2>
        <ul id="jobs"></ul>
    </section>

    <section id="job-form">
        <h2>Add a Job</h2>
        <form id="addJobForm">
            <input type="text" id="jobInput" placeholder="Enter job title" required>
            <button type="submit">Add Job</button>
        </form>
    </section>

    <script src="app.js"></script>
</body>
</html>
